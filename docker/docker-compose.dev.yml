version: "3.9"

# Local development override — hot reload, no build step needed
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: safeguard
      POSTGRES_USER: safeguard
      POSTGRES_PASSWORD: safeguard_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safeguard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
